<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>

    <style>
        body{
            text-align:center;
            font-family:Arial;
            background:#f4f4f4;
        }

        h1{
            margin-top:30px;
        }

        .board{
            width:300px;
            margin:20px auto;
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:5px;
        }

        .cell{
            width:100px;
            height:100px;
            background:white;
            font-size:40px;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            border:2px solid black;
        }

        button{
            padding:10px 20px;
            font-size:16px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<h1>Tic Tac Toe</h1>

<div class="board">
    <div class="cell" onclick="play(this)"></div>
    <div class="cell" onclick="play(this)"></div>
    <div class="cell" onclick="play(this)"></div>

    <div class="cell" onclick="play(this)"></div>
    <div class="cell" onclick="play(this)"></div>
    <div class="cell" onclick="play(this)"></div>

    <div class="cell" onclick="play(this)"></div>
    <div class="cell" onclick="play(this)"></div>
    <div class="cell" onclick="play(this)"></div>
</div>

<h2 id="status">X's Turn</h2>

<button onclick="restart()">Restart Game</button>

<script src="index.js" defer></script>

</body>
</html>
